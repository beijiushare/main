<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>beijiu.top 站点地图</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 删除Font Awesome引入 -->
  
  <!-- 配置Tailwind自定义颜色和字体 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3B82F6',
            secondary: '#10B981',
            accent: '#F59E0B',
            dark: '#1E293B',
            light: '#F8FAFC',
            wechat: '#2DD4BF' // 公众号专用颜色，更醒目
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .sitemap-container {
        @apply relative w-full h-[70vh] overflow-hidden bg-light rounded-lg border border-gray-200;
      }
      .node {
        @apply transition-all duration-200 cursor-pointer;
      }
      .node:hover {
        @apply stroke-primary stroke-2;
      }
      .wechat-node {
        @apply transition-all duration-300 cursor-pointer animate-pulse;
      }
      .wechat-node:hover {
        @apply stroke-wechat stroke-2 scale-105;
      }
      .btn {
        @apply px-4 py-2 rounded-md transition-all duration-200 flex items-center gap-2;
      }
      .btn-primary {
        @apply bg-primary text-white hover:bg-primary/90;
      }
      .card {
        @apply bg-white rounded-lg border border-gray-200 p-6 shadow-sm;
      }
      .context-menu {
        @apply fixed z-50 w-48 bg-white rounded-lg shadow-lg border border-gray-200 overflow-hidden opacity-0 transition-all duration-200 transform scale-95 pointer-events-none;
        visibility: hidden;
      }
      .context-menu.visible {
        opacity: 1;
        transform: scale(100%);
        visibility: visible;
        pointer-events: auto;
      }
      .context-menu-item {
        @apply px-4 py-2 flex items-center gap-2 text-sm cursor-pointer hover:bg-gray-100 transition-colors;
      }
      .context-menu-divider {
        @apply h-px bg-gray-200 my-0.5;
      }
      .info-popup {
        @apply fixed z-50 max-w-md bg-white rounded-lg shadow-xl border border-gray-200 p-4 opacity-0 transition-all duration-200 transform scale-95 pointer-events-none;
        visibility: hidden;
      }
      .info-popup.visible {
        opacity: 1;
        transform: scale(100%);
        visibility: visible;
        pointer-events: auto;
      }
      .info-popup-header {
        @apply flex justify-between items-start mb-2;
      }
      .mobile-list {
        @apply space-y-4;
      }
      .mobile-list-item {
        @apply border border-gray-200 rounded-lg overflow-hidden transition-all duration-200 hover:shadow-md;
      }
      .mobile-list-item-header {
        @apply px-4 py-3 font-medium flex justify-between items-center;
      }
      .mobile-list-item-content {
        @apply px-4 pb-3 text-sm text-gray-600;
      }
      .mobile-list-item-children {
        @apply pl-4 border-t border-gray-100 mt-2;
      }
      .wechat-item {
        @apply border-l-4 border-wechat bg-gradient-to-r from-wechat/5 to-transparent;
      }
      html {
        scroll-behavior: smooth;
      }
      .overlay {
        @apply fixed inset-0 bg-black bg-opacity-20 z-40 hidden;
      }
      .overlay.visible {
        @apply block;
      }
      /* 新增样式：禁止节点文字选中 */
      .node-text {
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
      }
    }
  </style>
</head>
<body class="font-sans bg-gray-50 text-gray-800 min-h-screen">
  <!-- 页面头部 -->
  <header class="bg-white border-b border-gray-200">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <!-- 替换站点地图图标 -->
        <span class="text-primary text-xl">📊</span>
        <h1 class="text-lg font-semibold">beijiu.top</h1>
      </div>
      <div class="flex items-center gap-3 desktop-controls">
        <button id="resetBtn" class="btn btn-primary">
          <!-- 替换刷新图标 -->
          <span>重置</span>
        </button>
        <button id="zoomInBtn" class="btn bg-gray-200 hover:bg-gray-300">
          <!-- 替换放大图标 -->
          <span>🔍+</span>
        </button>
        <button id="zoomOutBtn" class="btn bg-gray-200 hover:bg-gray-300">
          <!-- 替换缩小图标 -->
          <span>🔍-</span>
        </button>
      </div>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="container mx-auto px-4 py-6">
    <div class="mb-6">
      <p class="text-gray-600 text-sm">
        <a href="#usage-instructions" class="text-primary hover:underline flex items-center inline-flex gap-1">
          <span>使用说明</span>
          <!-- 替换外部链接图标 -->
          <span>↗</span>
        </a>
      </p>
    </div>
    
    <!-- 桌面端SVG地图容器 -->
    <div id="desktop-sitemap" class="sitemap-container mb-6">
      <div id="mapWrapper" class="absolute top-0 left-0 transform transition-transform duration-100 ease-out">
        <!-- SVG站点地图 -->
        <svg id="sitemap" width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
          <!-- 定义可复用的样式 -->
          <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
              <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"></polygon>
            </marker>
            <!-- 公众号节点的特殊阴影效果 -->
            <filter id="wechatShadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#2DD4BF" flood-opacity="0.5"/>
            </filter>
            <!-- 存储节点的解释信息和层级结构 -->
            <data id="nodeData">
              {
                "structure": {
                  "home": {
                    "name": "beijiu.top",
                    "color": "#3B82F6",
                    "url": "https://beijiu.top",
                    "description": "网站首页，提供站点地图服务",
                    "children": ["beijiux", "blog", "news", "chat"]
                  },
                  "beijiux": {
                    "name": "BeijiuX 储物间",
                    "color": "#10B981",
                    "url": "https://x.beijiu.top",
                    "description": "BeijiuX 储物间提供优质资源和工具集合",
                    "children": ["wechat", "tools"]
                  },
                  "wechat": {
                    "name": "公众号",
                    "color": "#2DD4BF",
                    "url": "https://x.beijiu.top/qrcode.webp",
                    "description": "BeijiuX 微信公众号，发布精心准备的实用工具推荐、详细教程和技术文档，扫码关注获取精品内容",
                    "isSpecial": true
                  },
                  "tools": {
                    "name": "tools",
                    "color": "#10B981",
                    "url": "https://uapis.cn/api/fanyi?text=该服务暂未开放",
                    "description": "Beijiux 自制的实用工具集合",
                    "children": ["wenxian"]
                  },
                  "wenxian": {
                    "name": "文显",
                    "color": "#10B981",
                    "url": "https://x.beijiu.top/tools/crypto/index.html",
                    "description": "简易的免费字符转换工具，"
                  },
                  "blog": {
                    "name": "博客",
                    "color": "#F59E0B",
                    "url": "https://blog.beijiu.top",
                    "description": "个人博客，分享技术与生活"
                  },
                  "news": {
                    "name": "北酒讯息",
                    "color": "#8B5CF6",
                    "url": "https://weeknews.beijiu.top",
                    "description": "最新资讯和事件评论"
                  },
                  "chat": {
                    "name": "chat",
                    "color": "#EC4899",
                    "url": "https://uapis.cn/api/fanyi?text=该服务暂未开放",
                    "description": "交流录（暂未开放）"
                  }
                }
              }
            </data>
          </defs>
          
          <!-- 连接线 -->
          <g stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrowhead)">
            <!-- 首页到主要分类 -->
            <line x1="600" y1="200" x2="600" y2="350"></line>
            <line x1="600" y1="200" x2="400" y2="350"></line>
            <line x1="600" y1="200" x2="800" y2="350"></line>
            <line x1="600" y1="200" x2="1000" y2="350"></line>
            
            <!-- BeijiuX 储物间到子节点 -->
            <line x1="600" y1="350" x2="500" y2="500"></line>
            <line x1="600" y1="350" x2="700" y2="500"></line>
            
            <!-- tools到子节点 -->
            <line x1="500" y1="500" x2="500" y2="630"></line>
          </g>
          
          <g>
            <!-- 中心节点 - 首页 -->
            <g class="node-link" data-node-id="home">
              <rect x="540" y="170" width="120" height="60" rx="6" fill="#3B82F6" class="node"></rect>
              <text x="600" y="205" text-anchor="middle" fill="white" font-weight="500" class="node-text">beijiu.top</text>
            </g>
            
            <!-- 主要分类节点 -->
            <g class="node-link" data-node-id="beijiux">
              <rect x="540" y="320" width="120" height="60" rx="6" fill="#10B981" class="node"></rect>
              <text x="600" y="355" text-anchor="middle" fill="white" font-weight="500" class="node-text">BeijiuX 储物间</text>
            </g>
            
            <g class="node-link" data-node-id="blog">
              <rect x="340" y="320" width="120" height="60" rx="6" fill="#F59E0B" class="node"></rect>
              <text x="400" y="355" text-anchor="middle" fill="white" font-weight="500" class="node-text">博客</text>
            </g>
            
            <g class="node-link" data-node-id="news">
              <rect x="740" y="320" width="120" height="60" rx="6" fill="#8B5CF6" class="node"></rect>
              <text x="800" y="355" text-anchor="middle" fill="white" font-weight="500" class="node-text">北酒讯息</text>
            </g>
            
            <g class="node-link" data-node-id="chat">
              <rect x="940" y="320" width="120" height="60" rx="6" fill="#EC4899" class="node"></rect>
              <text x="1000" y="355" text-anchor="middle" fill="white" font-weight="500" class="node-text">chat</text>
            </g>
            
            <!-- BeijiuX 子节点 -->
            <g class="node-link" data-node-id="wechat">
              <rect x="640" y="470" width="120" height="60" rx="6" fill="#2DD4BF" class="wechat-node" filter="url(#wechatShadow)"></rect>
              <text x="700" y="500" text-anchor="middle" fill="white" font-weight="600" class="node-text">公众号</text>
              <text x="700" y="520" text-anchor="middle" fill="white" font-size="10" class="node-text">求关注</text>
            </g>
            
            <g class="node-link" data-node-id="tools">
              <rect x="440" y="470" width="120" height="60" rx="4" fill="#10B981" class="node"></rect>
              <text x="500" y="505" text-anchor="middle" fill="white" font-size="14" class="node-text">tools</text>
            </g>
            
            <!-- tools 子节点 -->
            <g class="node-link" data-node-id="wenxian">
              <rect x="460" y="600" width="80" height="60" rx="4" fill="#10B981" class="node"></rect>
              <text x="500" y="635" text-anchor="middle" fill="white" font-size="14" class="node-text">文显</text>
            </g>
          </g>
        </svg>
      </div>
    </div>
    
    <!-- 移动端列表容器 -->
    <div id="mobile-sitemap" class="hidden mobile-list mb-6"></div>
    
    <!-- 说明卡片 -->
    <div id="usage-instructions" class="mt-6 card">
      <h3 class="text-base font-semibold mb-3 flex items-center">
        <i class="fa fa-info-circle text-primary mr-2"></i>使用说明
      </h3>
      <ul class="space-y-2 text-gray-600 text-sm" id="instructions-list">
        <!-- 说明内容将根据设备类型动态生成 -->
      </ul>
    </div>
  </main>

  <!-- 右键菜单（仅桌面端） -->
  <div id="contextMenu" class="context-menu hidden">
    <div id="menuItem1" class="context-menu-item">
      <i class="fa fa-external-link text-primary"></i>
      <span>在新标签页打开</span>
    </div>
    <div class="context-menu-divider"></div>
    <div id="menuItem2" class="context-menu-item">
      <i class="fa fa-info-circle text-primary"></i>
      <span>查看详情</span>
    </div>
  </div>
  
  <!-- 信息弹窗 -->
  <div id="infoPopup" class="info-popup">
    <div class="info-popup-header">
      <div id="popupTitle" class="info-popup-title font-medium text-lg"></div>
      <div id="popupClose" class="info-popup-close ml-auto cursor-pointer">
        <i class="fa fa-times"></i>
      </div>
    </div>
    <div id="popupContent" class="text-gray-600"></div>
  </div>
  
  <!-- 遮罩层 -->
  <div id="overlay" class="overlay"></div>

  <!-- 页脚 -->
  <footer class="bg-white border-t border-gray-200 mt-8 py-4">
    <div class="container mx-auto px-4 text-center text-gray-600 text-xs">
      <p>© 2025 beijiu.top 站点地图</p>
    </div>
  </footer>

  <script>
    // 检测设备是否为移动设备
    function isMobileDevice() {
      return window.innerWidth < 768;
    }
    
    // 从SVG数据中获取节点信息
    function getNodeData() {
      const nodeData = document.getElementById('nodeData').textContent;
      return JSON.parse(nodeData).structure;
    }
    
    // 创建移动端列表视图
    function createMobileList() {
      const nodeData = getNodeData();
      const mobileContainer = document.getElementById('mobile-sitemap');
      mobileContainer.innerHTML = '';
      
      // 从首页开始构建列表
      const homeNode = nodeData.home;
      const homeItem = createMobileListItem(homeNode, true);
      mobileContainer.appendChild(homeItem);
      
      // 递归添加子节点
      function createMobileListItem(node, isRoot = false) {
        const item = document.createElement('div');
        item.className = `mobile-list-item ${node.isSpecial ? 'wechat-item' : ''}`;
        
        // 设置标题栏左侧颜色标识
        item.style.borderLeft = `4px solid ${node.color}`;
        
        // 创建标题部分
        const header = document.createElement('div');
        header.className = 'mobile-list-item-header';
        
        const titleContainer = document.createElement('div');
        titleContainer.className = 'flex items-center';
        
        const title = document.createElement('a');
        title.href = node.url;
        title.target = '_blank';
        title.className = `text-gray-800 hover:text-primary ${node.isSpecial ? 'font-bold text-wechat' : ''}`;
        title.textContent = node.name;
        
        // 为公众号添加特殊标识
        if (node.isSpecial) {
          const badge = document.createElement('span');
          badge.className = 'ml-2 bg-wechat text-white text-xs px-1.5 py-0.5 rounded-full';
          badge.textContent = '推荐';
          titleContainer.appendChild(title);
          titleContainer.appendChild(badge);
        } else {
          titleContainer.appendChild(title);
        }
        
        header.appendChild(titleContainer);
        
        const content = document.createElement('div');
        content.className = 'mobile-list-item-content';
        content.textContent = node.description;
        
        item.appendChild(header);
        item.appendChild(content);
        
        // 如果有子节点，添加子节点列表
        if (node.children && node.children.length > 0) {
          const toggleBtn = document.createElement('button');
          toggleBtn.className = 'p-1 text-gray-500 hover:text-primary';
          toggleBtn.innerHTML = '<i class="fa fa-chevron-down"></i>';
          header.appendChild(toggleBtn);
          
          const childrenContainer = document.createElement('div');
          childrenContainer.className = 'mobile-list-item-children hidden';
          
          node.children.forEach(childId => {
            const childNode = nodeData[childId];
            const childItem = createMobileListItem(childNode);
            childrenContainer.appendChild(childItem);
          });
          
          item.appendChild(childrenContainer);
          
          // 添加展开/折叠功能
          toggleBtn.addEventListener('click', () => {
            childrenContainer.classList.toggle('hidden');
            const icon = toggleBtn.querySelector('i');
            if (childrenContainer.classList.contains('hidden')) {
              icon.className = 'fa fa-chevron-down';
            } else {
              icon.className = 'fa fa-chevron-up';
            }
          });
          
          // 如果是根节点，默认展开
          if (isRoot) {
            childrenContainer.classList.remove('hidden');
            toggleBtn.querySelector('i').className = 'fa fa-chevron-up';
          }
        }
        
        return item;
      }
    }
    
    // 根据设备类型显示不同的视图
    function setupResponsiveView() {
      const isMobile = isMobileDevice();
      const desktopSitemap = document.getElementById('desktop-sitemap');
      const mobileSitemap = document.getElementById('mobile-sitemap');
      const contextMenu = document.getElementById('contextMenu');
      const instructionsList = document.getElementById('instructions-list');
      
      if (isMobile) {
        // 移动端视图
        desktopSitemap.classList.add('hidden');
        mobileSitemap.classList.remove('hidden');
        contextMenu.classList.add('hidden');
        createMobileList();
        
        // 设置移动端使用说明
        instructionsList.innerHTML = `
          <li class="flex items-start">
            <span class="text-primary mt-1 mr-2">▼</span>
            <span>点击分类项旁的箭头可展开或折叠子菜单</span>
          </li>
          <li class="flex items-start">
            <span class="text-primary mt-1 mr-2">↗</span>
            <span>点击项目名称可在新标签页打开对应链接</span>
          </li>
          <li class="flex items-start">
            <span class="text-wechat mt-1 mr-2">★</span>
            <span>建议关注 BeijiuX 公众号</span>
          </li>
        `;
      } else {
        // 桌面端视图
        desktopSitemap.classList.remove('hidden');
        mobileSitemap.classList.add('hidden');
        contextMenu.classList.remove('hidden');
        
        // 设置桌面端使用说明 - 更新为反映新的操作方式
        instructionsList.innerHTML = `
          <li class="flex items-start">
         
            <span class="text-primary mt-1 mr-2">🖱️</span>
            <span>右键点击任何节点可打开操作菜单，您可以访问链接或查看详情</span>
          </li>
          <li class="flex items-start">
       
            <span class="text-primary mt-1 mr-2">↔️</span>
            <span>在任何位置（包括节点）保持按下左键并拖动可移动地图，松开左键停止拖拽</span>
          </li>
          <li class="flex items-start">
       
            <span class="text-primary mt-1 mr-2">🔍</span>
            <span>使用缩放按钮或鼠标滚轮可放大缩小地图</span>
          </li>
          <li class="flex items-start">
       
            <span class="text-primary mt-1 mr-2">🔄</span>
            <span>点击"重置"按钮可将地图恢复到初始状态</span>
          </li>
          <li class="flex items-start">
        
            <span class="text-wechat mt-1 mr-2">★</span>
            <span>建议关注 BeijiuX 公众号</span>
          </li>
        `;
        
        // 初始化桌面端地图功能
        initDesktopMap();
      }
    }
    
    // 初始化桌面端地图功能
    function initDesktopMap() {
      const mapWrapper = document.getElementById('mapWrapper');
      const resetBtn = document.getElementById('resetBtn');
      const zoomInBtn = document.getElementById('zoomInBtn');
      const zoomOutBtn = document.getElementById('zoomOutBtn');
      const sitemapContainer = document.querySelector('.sitemap-container');
      const contextMenu = document.getElementById('contextMenu');
      const menuItem1 = document.getElementById('menuItem1');
      const menuItem2 = document.getElementById('menuItem2');
      const infoPopup = document.getElementById('infoPopup');
      const popupTitle = document.getElementById('popupTitle');
      const popupContent = document.getElementById('popupContent');
      const popupClose = document.getElementById('popupClose');
      const overlay = document.getElementById('overlay');
      
      // 获取节点信息
      const nodeData = getNodeData();
      
      // 当前选中的节点
      let currentNode = null;
      
      // 状态变量
      let isDragging = false;
      let startX, startY;
      let translateX = 0, translateY = 0;
      let scale = 1;
      const minScale = 0.5;
      const maxScale = 1.5;
      
      // 计算初始位置，使地图居中
      function centerMap() {
        const containerRect = sitemapContainer.getBoundingClientRect();
        const svgWidth = 1200;
        const svgHeight = 800;
        
        // 计算居中所需的偏移量
        translateX = (containerRect.width - svgWidth) / 2;
        translateY = (containerRect.height - svgHeight) / 2;
        scale = 1;
        
        updateMapPosition();
      }
      
      // 更新地图位置和缩放
      function updateMapPosition() {
        mapWrapper.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
      }
      
      // 左键按下事件 - 用于启动拖拽（修改为在任何位置都可以启动拖拽）
      sitemapContainer.addEventListener('mousedown', function(e) {
        // 仅响应左键点击
        if (e.button === 0) {
          isDragging = true;
          startX = e.clientX - translateX;
          startY = e.clientY - translateY;
          sitemapContainer.style.cursor = 'grabbing';
          
          // 检查是否点击了节点，用于右键菜单
          const nodeLink = e.target.closest('.node-link');
          if (nodeLink) {
            currentNode = nodeLink;
          }
        }
      });
      
      // 鼠标移动事件 - 仅在拖拽状态下移动
      document.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        
        const newX = e.clientX - startX;
        const newY = e.clientY - startY;
        
        translateX = newX;
        translateY = newY;
        
        updateMapPosition();
      });
      
      // 鼠标释放事件 - 结束拖拽
      document.addEventListener('mouseup', function() {
        if (isDragging) {
          isDragging = false;
          sitemapContainer.style.cursor = 'default';
        }
      });
      
      // 缩放功能
      function zoomMap(delta) {
        const containerRect = sitemapContainer.getBoundingClientRect();
        const centerX = containerRect.width / 2;
        const centerY = containerRect.height / 2;
        
        const mouseX = centerX - translateX;
        const mouseY = centerY - translateY;
        
        const newScale = scale * delta;
        if (newScale >= minScale && newScale <= maxScale) {
          translateX = centerX - mouseX * delta;
          translateY = centerY - mouseY * delta;
          scale = newScale;
          updateMapPosition();
        }
      }
      
      // 缩放按钮事件
      zoomInBtn.addEventListener('click', () => zoomMap(1.1));
      zoomOutBtn.addEventListener('click', () => zoomMap(0.9));
      
      // 鼠标滚轮缩放
      sitemapContainer.addEventListener('wheel', function(e) {
        e.preventDefault();
        const delta = e.deltaY < 0 ? 1.1 : 0.9;
        zoomMap(delta);
      });
      
      // 重置按钮功能
      resetBtn.addEventListener('click', function() {
        mapWrapper.classList.add('transition-transform', 'duration-300', 'ease-out');
        centerMap();
        
        setTimeout(() => {
          mapWrapper.classList.remove('transition-transform', 'duration-300', 'ease-out');
        }, 300);
      });
      
      // 窗口大小改变时重新居中地图
      window.addEventListener('resize', function() {
        if (!isMobileDevice()) {
          centerMap();
        }
      });
      
      // 右键菜单功能 - 在任何节点上右键点击都显示菜单
      document.querySelectorAll('.node-link').forEach(node => {
        node.addEventListener('contextmenu', function(e) {
          e.preventDefault();
          
          currentNode = this;
          
          const x = e.clientX;
          const y = e.clientY;
          
          const menuWidth = contextMenu.offsetWidth;
          const menuHeight = contextMenu.offsetHeight;
          const viewportWidth = window.innerWidth;
          const viewportHeight = window.innerHeight;
          
          let menuX = x;
          let menuY = y;
          
          if (menuX + menuWidth > viewportWidth) {
            menuX = viewportWidth - menuWidth - 10;
          }
          
          if (menuY + menuHeight > viewportHeight) {
            menuY = viewportHeight - menuHeight - 10;
          }
          
          contextMenu.style.left = `${menuX}px`;
          contextMenu.style.top = `${menuY}px`;
          contextMenu.classList.add('visible');
          
          return false;
        });
      });
      
      // 点击其他地方关闭菜单
      document.addEventListener('click', function() {
        contextMenu.classList.remove('visible');
      });
      
      // 菜单选项1：在新标签页打开链接
      menuItem1.addEventListener('click', function(e) {
        e.stopPropagation();
        if (currentNode) {
          const nodeId = currentNode.getAttribute('data-node-id');
          const node = nodeData[nodeId];
          window.open(node.url, '_blank');
          contextMenu.classList.remove('visible');
        }
      });
      
      // 菜单选项2：查看详情
      menuItem2.addEventListener('click', function(e) {
        e.stopPropagation();
        if (currentNode) {
          const nodeId = currentNode.getAttribute('data-node-id');
          const node = nodeData[nodeId];
          
          popupTitle.textContent = node.name;
          popupContent.textContent = node.description;
          
          const containerRect = sitemapContainer.getBoundingClientRect();
          const popupX = containerRect.left + (containerRect.width - infoPopup.offsetWidth) / 2;
          const popupY = containerRect.top + (containerRect.height - infoPopup.offsetHeight) / 2;
          
          infoPopup.style.left = `${popupX}px`;
          infoPopup.style.top = `${popupY}px`;
          infoPopup.classList.add('visible');
          overlay.classList.add('visible');
          
          contextMenu.classList.remove('visible');
        }
      });
      
      // 关闭弹窗
      function closePopup() {
        infoPopup.classList.remove('visible');
        overlay.classList.remove('visible');
      }
      
      popupClose.addEventListener('click', closePopup);
      overlay.addEventListener('click', closePopup);
      
      // 按ESC键关闭菜单和弹窗
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          contextMenu.classList.remove('visible');
          closePopup();
        }
      });
      
      // 初始化地图位置
      centerMap();
    }
    
    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', function() {
      setupResponsiveView();
      
      // 窗口大小改变时重新检查设备类型
      window.addEventListener('resize', function() {
        setupResponsiveView();
      });
    });
  </script>
</body>
</html>
